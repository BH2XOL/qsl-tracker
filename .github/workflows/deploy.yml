name: Deploy to Cloudflare Workers
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          preCommands: |
            sed -i "s|\${WORKER_NAME}|${{ secrets.WORKER_NAME }}|g" wrangler.toml
            sed -i "s|\${D1_DATABASE_ID}|${{ secrets.D1_DATABASE_ID }}|g" wrangler.toml
          command: deploy
          postCommands: |
            echo "${{ secrets.DOMAIN }}" | npx wrangler secret put DOMAIN
            echo "${{ secrets.CALLSIGN }}" | npx wrangler secret put CALLSIGN
